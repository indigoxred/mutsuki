services:
  mutsuki-progress-bridge:
    build: .
    container_name: mutsuki-progress-bridge
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MUTSUKI_BRIDGE_DATA: /data/events.jsonl
      # Optional. If set, configure the same token in the Paperback extension.
      MUTSUKI_BRIDGE_TOKEN: ""
    volumes:
      - ./data:/data
