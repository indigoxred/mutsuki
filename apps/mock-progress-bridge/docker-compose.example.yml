services:
  mutsuki-progress-bridge:
    image: ghcr.io/indigoxred/mutsuki/mock-progress-bridge:latest
    # To build locally instead:
    # build:
    #   context: ../..
    #   dockerfile: apps/mock-progress-bridge/Dockerfile
    container_name: mutsuki-progress-bridge
    ports:
      # Host port 6767 avoids common conflicts with qBittorrent's 8080 web UI.
      # The container still listens on 8080 internally.
      - "6767:8080"
    environment:
      PORT: "8080"
      MUTSUKI_BRIDGE_DATA: /data/events.jsonl
      # Optional. If set, configure the same token in the Paperback extension.
      MUTSUKI_BRIDGE_TOKEN: ""
    volumes:
      - ./data:/data
