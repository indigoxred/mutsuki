services:
  mutsuki-kavita-mal-bridge:
    image: ghcr.io/indigoxred/mutsuki/kavita-mal-bridge:latest
    # To build locally instead:
    # build:
    #   context: ../..
    #   dockerfile: apps/kavita-mal-bridge/Dockerfile
    container_name: mutsuki-kavita-mal-bridge
    ports:
      - "6768:6768"
    environment:
      PORT: "6768"
      MUTSUKI_BRIDGE_DB: /data/mutsuki-bridge.sqlite
      # Keep true until mappings and desired updates look correct in the UI.
      MUTSUKI_BRIDGE_DRY_RUN: "true"
      # Optional: these can also be configured from the bridge Web UI.
      MUTSUKI_BRIDGE_POLL_INTERVAL_SECONDS: "1800"
      MUTSUKI_BRIDGE_MAX_MAL_SEARCHES_PER_RUN: "50"
      KAVITA_BASE_URL: ""
      KAVITA_API_KEY: ""
      MAL_CLIENT_ID: ""
      MAL_CLIENT_SECRET: ""
      MAL_REDIRECT_URI: ""
    volumes:
      - ./data:/data
